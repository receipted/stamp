<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cockpit</title>
  <style>
    :root {
      --bg: #0d1117; --bg2: #161b22; --card: #1c2128; --border: #30363d;
      --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
      --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
      --red: #f85149; --purple: #bc8cff; --orange: #ffa657;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    .header {
      padding: 8px 16px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .header-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
    .header-count { font-size: 11px; color: var(--text3); margin-left: auto; }

    /* Two tabs */
    .tabs {
      display: flex; background: var(--bg2);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .tab {
      padding: 10px 20px; font-size: 12px; font-weight: 500;
      color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.1s; user-select: none; display: flex; align-items: center; gap: 6px;
    }
    .tab:hover { color: var(--text2); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab .n { font-size: 10px; background: var(--card); padding: 1px 5px; border-radius: 10px; color: var(--text3); }
    .tab.active .n { background: var(--accent); color: #000; }

    /* Source filter */
    .src-bar {
      display: flex; gap: 2px; padding: 5px 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg);
    }
    .src { padding: 3px 9px; font-size: 11px; color: var(--text3); cursor: pointer; border-radius: 3px; }
    .src:hover { background: var(--card); color: var(--text2); }
    .src.on { background: var(--card); color: var(--accent); }

    /* Content scroll */
    .content { flex: 1; overflow-y: auto; padding: 10px 12px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── NUGGET ── */
    .nugget {
      border: 1px solid var(--border); border-radius: 7px;
      margin-bottom: 8px; overflow: hidden; background: var(--card);
      transition: border-color 0.1s;
    }
    .nugget.attn { border-color: var(--red); }
    .nugget.highlighted { border-color: var(--accent); }

    .nugget-top {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; cursor: pointer;
    }
    .nugget-top:hover { background: #21262d; }

    .nflag {
      font-size: 9px; font-weight: 700; padding: 2px 6px;
      border-radius: 3px; text-transform: uppercase; flex-shrink: 0; margin-top: 1px;
    }
    .nf-attn { background: rgba(248,81,73,0.2); color: var(--red); }
    .nf-ok   { background: rgba(63,185,80,0.15); color: var(--green); }
    .nf-cont { background: rgba(210,153,34,0.15); color: var(--yellow); }

    .nugget-body { flex: 1; min-width: 0; }
    .nugget-summary {
      font-size: 12px; color: var(--text); line-height: 1.5;
      /* one line truncated when collapsed */
    }
    .nugget-meta {
      display: flex; gap: 8px; margin-top: 4px; font-size: 10px; color: var(--text3);
      align-items: center;
    }
    .nugget-src { }
    .nugget-time { }

    .expand-arrow {
      flex-shrink: 0; color: var(--text3); font-size: 11px;
      transition: transform 0.15s; margin-top: 3px;
    }
    .nugget.open .expand-arrow { transform: rotate(90deg); }

    /* Accordion detail */
    .nugget-detail {
      display: none; border-top: 1px solid var(--border);
      padding: 8px 12px; background: var(--bg);
    }
    .nugget.open .nugget-detail { display: block; }

    /* Claims inside nugget */
    .ic {
      display: flex; gap: 7px; align-items: flex-start;
      padding: 5px 0; border-bottom: 1px solid rgba(48,54,61,0.5); font-size: 11px;
    }
    .ic:last-child { border-bottom: none; }
    .ict {
      font-size: 9px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 2px 5px; border-radius: 3px;
      flex-shrink: 0; margin-top: 1px;
    }
    .ict-co { background: rgba(88,166,255,0.15); color: var(--accent); }
    .ict-cn { background: rgba(248,81,73,0.15); color: var(--red); }
    .ict-un { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .ict-re { background: rgba(63,185,80,0.15); color: var(--green); }
    .ict-wi { background: rgba(188,140,255,0.15); color: var(--purple); }
    .ict-ct { background: rgba(255,166,87,0.15); color: var(--orange); }
    .ict-lo { background: rgba(110,118,129,0.1); color: var(--text3); }

    .ic-text { color: var(--text2); flex: 1; line-height: 1.4; }
    .ic-conf { font-size: 9px; color: var(--text3); white-space: nowrap; }

    .src-link {
      display: inline-block; margin-top: 8px; font-size: 10px;
      color: var(--accent); cursor: pointer;
    }
    .src-link:hover { text-decoration: underline; }

    /* ── TURN (sediment) ── */
    .turn {
      border: 1px solid var(--border); border-radius: 6px;
      margin-bottom: 6px; overflow: hidden;
    }
    .turn.highlighted { border-color: var(--accent); }
    .turn-head {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; background: var(--card); cursor: pointer; font-size: 11px;
    }
    .turn-head:hover { background: #21262d; }
    .ab {
      font-size: 9px; font-weight: 700; padding: 2px 6px;
      border-radius: 3px; text-transform: uppercase; flex-shrink: 0;
    }
    .ab-h { background: rgba(88,166,255,0.15); color: var(--accent); }
    .ab-c { background: rgba(188,140,255,0.15); color: var(--purple); }
    .ab-x { background: rgba(63,185,80,0.15); color: var(--green); }
    .ab-s { background: rgba(110,118,129,0.1); color: var(--text3); }
    .turn-pre { flex: 1; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .turn-time { color: var(--text3); font-size: 10px; white-space: nowrap; }
    .turn-body {
      display: none; padding: 8px 10px; font-size: 12px;
      line-height: 1.6; color: var(--text2); background: var(--bg);
      border-top: 1px solid var(--border); white-space: pre-wrap; word-break: break-word;
    }
    .turn.open .turn-body { display: block; }

    .empty { color: var(--text3); font-size: 11px; text-align: center; padding: 32px; }
  </style>
</head>
<body>

<div class="header">
  <div class="dot" id="dot"></div>
  <div class="header-title">Cockpit</div>
  <div class="header-count" id="hcount">0 turns</div>
</div>

<div class="tabs">
  <div class="tab active" id="t-nuggets" onclick="tab('nuggets')">
    Nuggets <span class="n" id="n-nuggets">0</span>
  </div>
  <div class="tab" id="t-sediment" onclick="tab('sediment')">
    Sediment <span class="n" id="n-sediment">0</span>
  </div>
</div>

<div class="src-bar">
  <div class="src on" onclick="src(this,'all')">All</div>
  <div class="src" onclick="src(this,'telegram')">Telegram</div>
  <div class="src" onclick="src(this,'claude-code')">Claude Code</div>
  <div class="src" onclick="src(this,'codex')">Codex</div>
  <div class="src" onclick="src(this,'api')">API</div>
</div>

<div class="content" id="content"></div>

<script>
let activeTab = 'nuggets';
let activeSrc = 'all';
let turns = [], nuggets = [];
let _uid = 0;
const uid = () => 'u' + (++_uid);

// ── TAB / SOURCE ──
function tab(t) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('t-' + t).classList.add('active');
  render();
}

function src(el, s) {
  activeSrc = s;
  document.querySelectorAll('.src').forEach(e => e.classList.remove('on'));
  el.classList.add('on');
  render();
}

function filterSrc(arr) {
  if (activeSrc === 'all') return arr;
  return arr.filter(x => {
    const s = (x.stream || x.source || '').toLowerCase().replace(/[^a-z]/g,'');
    return s.includes(activeSrc.replace('-',''));
  });
}

// ── RENDER ──
function render() {
  const c = document.getElementById('content');
  const fn = filterSrc(nuggets);
  const ft = filterSrc(turns);
  document.getElementById('n-nuggets').textContent = fn.length;
  document.getElementById('n-sediment').textContent = ft.length;
  if (activeTab === 'nuggets') renderNuggets(fn, c);
  else renderSediment(ft, c);
}

function renderNuggets(items, c) {
  if (!items.length) { c.innerHTML = '<div class="empty">Waiting for sieve output…</div>'; return; }
  c.innerHTML = '';
  [...items].reverse().forEach(n => {
    const div = document.createElement('div');
    const attn = n.needs_attention;
    const cont = n.has_contested;
    div.className = 'nugget' + (attn ? ' attn' : '');
    div.id = 'nug-' + n.id;

    const flag = attn  ? `<span class="nflag nf-attn">⚡ Attention</span>`
               : cont ? `<span class="nflag nf-cont">🔄 Contested</span>`
               :        `<span class="nflag nf-ok">✓ Promoted</span>`;

    // Build inner claims html
    let claimsHtml = '';
    (n.claims||[]).forEach(cl => {
      const [cc, cl_] = ctInfo(cl.claim_type);
      claimsHtml += `
        <div class="ic">
          <span class="ict ${cc}">${cl_}</span>
          <span class="ic-text">${esc(cl.text||'')}</span>
          <span class="ic-conf">${cl.confidence ? (cl.confidence*100|0)+'%' : ''}</span>
        </div>`;
    });

    const turnLink = n.turn_id
      ? `<span class="src-link" onclick="goSediment('${n.turn_id}')">→ view source turn</span>` : '';

    div.innerHTML = `
      <div class="nugget-top" onclick="toggleNug('${n.id}')">
        ${flag}
        <div class="nugget-body">
          <div class="nugget-summary">${esc(n.summary||n.text||'')}</div>
          <div class="nugget-meta">
            <span class="nugget-src">${esc(n.stream||n.source||'')}</span>
            <span class="nugget-time">${n.time||''}</span>
          </div>
        </div>
        <div class="expand-arrow">›</div>
      </div>
      <div class="nugget-detail">
        ${claimsHtml || '<div style="color:var(--text3);font-size:11px;padding:4px 0">No detailed claims</div>'}
        ${turnLink}
      </div>`;
    c.appendChild(div);
  });
}

function renderSediment(items, c) {
  if (!items.length) { c.innerHTML = '<div class="empty">No turns captured yet…</div>'; return; }
  c.innerHTML = '';
  [...items].reverse().forEach(t => {
    const div = document.createElement('div');
    div.className = 'turn';
    div.id = 'turn-' + t.id;
    const ac = aClass(t.actor), as = aShort(t.actor);
    const pre = (t.text||'').slice(0,90) + ((t.text||'').length>90?'…':'');
    const tm = t.timestamp ? new Date(t.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    div.innerHTML = `
      <div class="turn-head" onclick="toggleTurn('${t.id}')">
        <span class="ab ${ac}">${as}</span>
        <span class="turn-pre">${esc(pre)}</span>
        <span class="turn-time">${tm}</span>
      </div>
      <div class="turn-body">${esc(t.text||'')}</div>`;
    c.appendChild(div);
  });
}

// ── TOGGLES ──
function toggleNug(id) {
  document.getElementById('nug-'+id)?.classList.toggle('open');
}
function toggleTurn(id) {
  document.getElementById('turn-'+id)?.classList.toggle('open');
}

// ── NAVIGATION: nugget → sediment ──
function goSediment(turnId) {
  tab('sediment');
  setTimeout(() => {
    const el = document.getElementById('turn-'+turnId);
    if (!el) return;
    el.classList.add('highlighted', 'open');
    el.scrollIntoView({behavior:'smooth', block:'center'});
    setTimeout(() => el.classList.remove('highlighted'), 3000);
  }, 80);
}

// ── HELPERS ──
function ctInfo(type) {
  const m = {
    fact:        ['ict-co','CONTRACT'],
    constraint:  ['ict-cn','CONSTRAINT'],
    hypothesis:  ['ict-un','UNCERTAINTY'],
    observation: ['ict-re','RELATION'],
    guarantee:   ['ict-wi','WITNESS'],
    contested:   ['ict-ct','CONTESTED'],
    loss:        ['ict-lo','LOSS'],
  };
  return m[type] || ['ict-re', (type||'').toUpperCase()];
}
function aClass(a) {
  if (!a) return 'ab-s';
  a = a.toLowerCase();
  if (a.includes('human')) return 'ab-h';
  if (a.includes('claude')||a.includes('sonnet')||a.includes('opus')) return 'ab-c';
  if (a.includes('codex')) return 'ab-x';
  return 'ab-s';
}
function aShort(a) {
  if (!a) return 'sys';
  return a.split(':').pop().split('-')[0].slice(0,8);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── INGEST ──
function ingestTurn(t) {
  t.id = t.id || uid();
  turns.push(t);
  document.getElementById('hcount').textContent = turns.length + ' turns';
}

// Ingest a nugget — comes with its supporting claims bundled
function ingestNugget(n) {
  n.id = n.id || uid();
  nuggets.push(n);
}

// Convenience: ingest a raw claim and auto-create a nugget
function ingestClaim(c) {
  c.id = c.id || uid();
  const attn = c.claim_type === 'constraint' && (c.confidence||0) > 0.85;
  // Find or create nugget for this turn
  let nug = nuggets.find(n => n.turn_id === c.turn_id && n.stream === c.stream);
  if (!nug) {
    nug = {
      id: uid(),
      summary: c.text,
      turn_id: c.turn_id,
      source: c.source,
      stream: c.stream,
      time: c.timestamp ? new Date(c.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '',
      claims: [],
      needs_attention: false,
      has_contested: false,
    };
    nuggets.push(nug);
  }
  nug.claims.push(c);
  if (attn) nug.needs_attention = true;
  if (c.contested) nug.has_contested = true;
}

// ── SSE ──
function connect() {
  try {
    const es = new EventSource('http://localhost:7788/stream');
    es.onopen = () => document.getElementById('dot').style.background = 'var(--green)';
    es.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === 'turn') ingestTurn(d);
        else if (d.type === 'claim') ingestClaim(d);
        else if (d.type === 'nugget') ingestNugget(d);
        render();
      } catch {}
    };
    es.onerror = () => { document.getElementById('dot').style.background = 'var(--yellow)'; demo(); };
  } catch { demo(); }
}

function demo() {
  const t1 = uid(), t2 = uid(), t3 = uid(), t4 = uid();
  [
    { id:t1, text:'The turn chain needs Merkle anchoring before we can claim trustless verification.', actor:'human:ben', stream:'telegram', timestamp:new Date().toISOString() },
    { id:t2, text:'compute_anchor() is a pure function. Same chain = same root, always. No IO.', actor:'claude-sonnet-4-6', stream:'telegram', timestamp:new Date().toISOString() },
    { id:t3, text:'The sieve must be a pure function. No LLM calls in the promotion path.', actor:'human:ben', stream:'claude-code', timestamp:new Date().toISOString() },
    { id:t4, text:'Wiring graph-lab BFS relevance into promote() — replacing keyword matching with graph traversal.', actor:'claude-sonnet-4-6', stream:'claude-code', timestamp:new Date().toISOString() },
  ].forEach(ingestTurn);
  [
    { turn_id:t1, text:'Merkle anchoring is required before trustless verification is possible', claim_type:'constraint', confidence:0.95, source:'human:ben', stream:'telegram' },
    { turn_id:t2, text:'compute_anchor() is a pure function: same chain = same root, always', claim_type:'guarantee', confidence:0.95, source:'sonnet', stream:'telegram' },
    { turn_id:t3, text:'The sieve must contain no LLM calls in the promotion path', claim_type:'constraint', confidence:0.98, source:'human:ben', stream:'claude-code' },
    { turn_id:t4, text:'Graph-lab BFS relevance replaces keyword matching in promote()', claim_type:'fact', confidence:0.9, source:'sonnet', stream:'claude-code' },
  ].forEach(ingestClaim);
  render();
}

connect();
</script>
</body>
</html>
